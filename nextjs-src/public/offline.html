<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArchFlow — Офлайн</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'IBM Plex Mono', monospace;
    background: #F6F6F4;
    color: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .container {
    text-align: center;
    max-width: 400px;
  }
  .icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.4;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  p {
    font-size: 13px;
    color: #111;
    opacity: 0.5;
    margin-bottom: 24px;
  }
  button {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 24px;
    border: 1px solid #111;
    background: transparent;
    color: #111;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  button:hover {
    background: #111;
    color: #fff;
  }
</style>
</head>
<body>
<div class="container">
  <div class="icon">&#9888;</div>
  <h1>Нет подключения</h1>
  <p>Проверьте соединение с интернетом и попробуйте снова</p>
  <button onclick="location.reload()">Обновить</button>
</div>
</body>
</html>
