<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Archflow — Нет подключения</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    background: #F6F6F4;
    color: #111;
    padding: 24px;
  }
  .c {
    max-width: 420px;
    text-align: center;
  }
  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 28px;
    margin: 0 0 12px;
    font-weight: 900;
    line-height: 1.1;
  }
  p {
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    line-height: 1.6;
    margin: 0 0 8px;
    color: #111;
  }
  .hint {
    font-size: 10px;
    letter-spacing: .04em;
    text-transform: none;
    opacity: .6;
    margin: 20px 0 28px;
    line-height: 1.6;
  }
  button {
    font-family: inherit;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .15em;
    padding: 14px 28px;
    background: #111;
    color: #fff;
    border: 0.5px solid #111;
    cursor: pointer;
    margin: 4px;
  }
  button.ghost {
    background: none;
    color: #111;
  }
  button:hover {
    background: #fff;
    color: #111;
  }
</style>
</head>
<body>
<div class="c">
  <h1>Нет связи с сервером</h1>
  <p>Archflow временно недоступен</p>
  <div class="hint">
    Проверьте подключение к интернету.<br/>
    Если сайт не открывается — попробуйте VPN или мобильный интернет, возможно ваш провайдер блокирует доступ.
  </div>
  <button onclick="location.reload()">Обновить</button>
  <button class="ghost" onclick="location.href='/reset'">Сбросить кэш</button>
</div>
</body>
</html>
