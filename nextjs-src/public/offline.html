<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Archflow — Офлайн</title>
<style>
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono',monospace; background:#fff; color:#111; }
  .c { text-align:center; padding:24px; }
  h1 { font-family:'Playfair Display',serif; font-size:24px; margin:0 0 8px; }
  p { font-size:12px; letter-spacing:.08em; text-transform:uppercase; opacity:.5; margin:0 0 24px; }
  button { font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase;
    letter-spacing:.15em; padding:14px 28px; background:#111; color:#fff; border:none; cursor:pointer; }
  button:hover { background:#fff; color:#111; outline:0.5px solid #111; }
</style>
</head>
<body>
<div class="c">
  <h1>Нет подключения</h1>
  <p>Проверьте соединение и попробуйте снова</p>
  <button onclick="location.reload()">Обновить</button>
</div>
</body>
</html>
