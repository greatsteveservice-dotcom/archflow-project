[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect archflow.art → archflow.ru (301 permanent)
[[redirects]]
  from = "https://archflow.art/*"
  to = "https://archflow.ru/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.archflow.art/*"
  to = "https://archflow.ru/:splat"
  status = 301
  force = true

# Redirect www → apex
[[redirects]]
  from = "https://www.archflow.ru/*"
  to = "https://archflow.ru/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"
