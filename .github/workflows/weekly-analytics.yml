name: Analytics Report

on:
  schedule:
    # Every day at 06:00 UTC (09:00 MSK).
    # /api/cron/analytics auto-picks period via autoPeriod():
    #   • 1st of month → monthly
    #   • Mondays      → weekly
    #   • other days   → daily (yesterday)
    - cron: '0 6 * * *'
  workflow_dispatch: {} # manual trigger

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger analytics report
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            "https://archflow.ru/api/cron/analytics?secret=${{ secrets.CRON_SECRET }}")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -1)
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" != "200" ]; then
            echo "::error::Analytics report failed with status $http_code"
            exit 1
          fi
