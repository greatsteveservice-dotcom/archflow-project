# Archflow — nginx reverse proxy to Next.js standalone server
#
# Path: /etc/nginx/sites-available/archflow.conf
# Enable: ln -s /etc/nginx/sites-available/archflow.conf /etc/nginx/sites-enabled/
#
# certbot will auto-patch ssl_certificate and 80→443 redirect when you run:
#   sudo certbot --nginx -d archflow.ru -d www.archflow.ru

# Upstream: Next.js standalone server
upstream archflow_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP → HTTPS redirect (certbot will manage this automatically)
server {
    listen 80;
    listen [::]:80;
    server_name archflow.ru www.archflow.ru;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name archflow.ru www.archflow.ru;

    # SSL (placeholders — certbot will fill in)
    # ssl_certificate /etc/letsencrypt/live/archflow.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/archflow.ru/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Uploads / requests size (design files up to 50 MB per client limit)
    client_max_body_size 60M;
    client_body_timeout 60s;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Static Next.js assets — long cache (hashed filenames)
    location /_next/static/ {
        proxy_pass http://archflow_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public static assets
    location /public/ {
        proxy_pass http://archflow_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600";
    }

    # Service Worker — never cache at proxy level (must be fresh)
    location = /sw.js {
        proxy_pass http://archflow_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Manifest — short cache
    location = /manifest.json {
        proxy_pass http://archflow_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600";
    }

    # All other traffic → Next.js
    location / {
        proxy_pass http://archflow_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }

    # Health check endpoint (for monitoring)
    location = /_health {
        access_log off;
        proxy_pass http://archflow_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
